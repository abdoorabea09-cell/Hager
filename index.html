<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>قضية كعكة هاجر | Ace Attorney</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DotGothic16&display=swap');

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; overflow: hidden;
            font-family: 'DotGothic16', sans-serif; touch-action: manipulation;
        }

        #game-container {
            position: relative; width: 100%; height: 100dvh;
            background-size: cover; background-position: center;
            image-rendering: pixelated; overflow: hidden;
            /* توسيط محتوى الحاوية */
            display: flex; justify-content: center; align-items: center;
        }

        /* المشاهد */
        .scene-court { background-image: url('courtroom.png'); background-size: cover; width: 100%; height: 100%; }
        .scene-judge { background-image: url('judgedesk.png'); background-size: cover; width: 100%; height: 100%; }
        
        /* مشهد الكيكة المربعة في المنتصف */
        .scene-cake { 
            background-image: url('cake.png') !important; 
            background-size: contain !important;
            background-repeat: no-repeat !important;
            background-position: center !important;
            /* الأبعاد المربعة المطلوبة */
            width: 782px !important;
            height: 768px !important;
            /* لضمان التناسب مع الشاشات الصغيرة */
            max-width: 95vw !important;
            max-height: 85dvh !important;
            margin: auto;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        } 

        .character-sprite {
            position: absolute; z-index: 2; display: none;
            left: 50%; transform: translateX(-50%);
        }
        #hager { height: 70dvh; bottom: 5dvh; left: 55%; }
        #judge { height: 25dvh; bottom: 43dvh; left: 51%; }
        #accused { height: 70dvh; bottom: 5dvh; left: 50%; }

        .dialogue-box {
            position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
            width: 96%; height: 30dvh; background: rgba(0, 0, 25, 0.95);
            border: 2px solid #fff; padding: 15px; box-sizing: border-box; z-index: 10;
        }

        .name-label {
            position: absolute; top: -15px; right: 20px;
            background: #d32f2f; color: white; padding: 2px 20px;
            font-size: clamp(14px, 2.5dvh, 20px); border: 2px solid #fff;
        }

        .text-line { color: white; font-size: clamp(16px, 3.5dvh, 24px); line-height: 1.5; text-align: right; }

        #choices-container {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            display: none; flex-direction: column; gap: 12px; z-index: 100; width: 80%;
        }
        .choice-btn {
            background: rgba(211, 47, 47, 0.95); color: white; border: 2px solid #fff;
            padding: 15px; font-family: 'DotGothic16', sans-serif; cursor: pointer;
            font-size: 18px; text-align: center; border-radius: 5px;
        }

        #objection-overlay {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%) scale(0);
            font-size: 80px; color: red; font-weight: bold; -webkit-text-stroke: 2px white; z-index: 110;
        }

        .shake { animation: shake 0.4s; }
        @keyframes shake { 0%,100%{transform:translate(0,0)} 25%{transform:translate(5px,5px)} 50%{transform:translate(-5px,-5px)} }

        .confetti { position: absolute; width: 10px; height: 10px; z-index: 15; pointer-events: none; }
    </style>
</head>
<body>

    <div id="game-container" class="scene-judge">
        <div id="objection-overlay">OBJECTION!</div>
        
        <div id="choices-container">
            <button class="choice-btn" onclick="makeChoice(1)">بصماتك على مقبض الثلاجة!</button>
            <button class="choice-btn" onclick="makeChoice(2)">تناقض أقوالك حول سبب تواجدك هناك!</button>
            <button class="choice-btn" onclick="makeChoice(3)">انخفاض درجة حرارة يدك بشكل مريب!</button>
        </div>

        <img src="hager.png" id="hager" class="character-sprite">
        <img src="judge.png" id="judge" class="character-sprite">
        <img src="accused.png" id="accused" class="character-sprite">

        <div class="dialogue-box" id="next-btn">
            <div class="name-label" id="speaker-name">المحكمة</div>
            <div class="text-line" id="dialogue-text">انقر لبدء الجلسة...</div>
        </div>
    </div>

    <audio id="bg-music" src="trial.mp3" loop></audio>
    <audio id="happy-music" src="celebration.mp3" loop></audio> 
    <audio id="sfx-blip" src="blip.mp3"></audio>
    <audio id="sfx-slam" src="slam.mp3"></audio>

    <script>
        let dialogue = [
            { name: "القاضي", scene: "scene-judge", text: "هدوء في القاعة! المحكمة الآن تنظر في أخطر قضية هذا الشهر...", char: "judge", img: "judge.png" },
            { name: "القاضي", scene: "scene-judge", text: "قضية اختفاء كعكة عيد ميلاد المحامية هاجر.", char: "judge", img: "judge.png" },
            { name: "هاجر", scene: "scene-court", text: "سيدي القاضي، الأدلة واضحة. المتهم كان آخر من شوهد قرب الثلاجة.", char: "hager", img: "hager.png" },
            { name: "المتهم", scene: "scene-court", text: "كنت فقط أتأكد أن الكيكة.. أعني الثلاجة.. تعمل جيدا!", char: "accused", img: "accused.png" },
            { name: "هاجر", scene: "scene-court", text: "كاذب! الدليل الذي يثبت جريمتك هو...", char: "hager", img: "hager_objection.png", isObjection: true, showChoices: true }
        ];

        let currentIdx = -1;
        let isTyping = false;
        let musicStarted = false;

        const textTarget = document.getElementById('dialogue-text');
        const bgMusic = document.getElementById('bg-music');
        const happyMusic = document.getElementById('happy-music');

        function typeWriter(text, callback) {
            isTyping = true;
            textTarget.innerHTML = "";
            let i = 0;
            let interval = setInterval(() => {
                textTarget.innerHTML += text.charAt(i);
                if (i % 2 === 0) { 
                    const blip = document.getElementById('sfx-blip');
                    blip.currentTime = 0; blip.play().catch(e=>{});
                }
                i++;
                if (i >= text.length) { clearInterval(interval); isTyping = false; if (callback) callback(); }
            }, 45);
        }

        function showStep() {
            if (isTyping) return;
            currentIdx++;
            if (currentIdx < dialogue.length) {
                const step = dialogue[currentIdx];
                const container = document.getElementById('game-container');
                
                // تغيير المشهد فوراً
                container.className = step.scene;
                
                // الموسيقى
                if (step.changeMusic) {
                    bgMusic.pause();
                    happyMusic.currentTime = 0;
                    happyMusic.play();
                    happyMusic.volume = 0.5;
                }
                if (step.scene === 'scene-cake') {
                    createConfetti();
                }

                // إخفاء الشخصيات
                document.querySelectorAll('.character-sprite').forEach(img => img.style.display = 'none');
                if(step.char) {
                    const charImg = document.getElementById(step.char);
                    charImg.style.display = "block";
                    charImg.src = step.img;
                }

                if (step.isObjection) {
                    const obj = document.getElementById('objection-overlay');
                    obj.style.transform = "translate(-50%, -50%) scale(1.2)";
                    container.classList.add('shake');
                    setTimeout(() => { obj.style.transform = "translate(-50%, -50%) scale(0)"; container.classList.remove('shake'); }, 600);
                }

                if (step.hammer) {
                    const slam = document.getElementById('sfx-slam');
                    slam.play();
                    container.classList.add('shake');
                    setTimeout(() => container.classList.remove('shake'), 400);
                }

                document.getElementById('speaker-name').innerText = step.name;
                typeWriter(step.text, () => {
                    if (step.showChoices) document.getElementById('choices-container').style.display = 'flex';
                });
            }
        }

        function makeChoice(num) {
            document.getElementById('choices-container').style.display = 'none';
            let evidenceText = num === 1 ? "بصماتك على مقبض الثلاجة تثبت أنك فتحتها عمداً!" : 
                               num === 2 ? "ارتباكك الآن هو أكبر دليل على محاولتك إخفاء الحقيقة!" : 
                               "انخفاض حرارة يدك يعني أنك لمست الكعكة الباردة للتو!";

            const twist = [
                { name: "هاجر", scene: "scene-court", text: evidenceText, char: "hager", img: "hager.png" },
                { name: "القاضي", scene: "scene-judge", text: "مرافعة جيدة جداً يا هاجر.. لكنكِ نسيتي شيئاً مهماً جداً.", char: "judge", img: "judge.png" },
                { name: "هاجر", scene: "scene-court", text: "وما هو؟", char: "hager", img: "hager_objection.png" },
                { name: "القاضي", scene: "scene-judge", text: "الكعكة لم تُسرق.. لأنها كانت مفاجأة عيد ميلادك! كل سنة وأنتِ طيبة! 🎂", char: "judge", img: "judge_hammer.png", hammer: true, changeMusic: true },
                { name: "المحكمة", scene: "scene-cake", text: "مفاجأة!!! عيد ميلاد سعيد يا هاجر! ✨❤️", char: null }
            ];

            dialogue = dialogue.concat(twist);
            showStep();
        }

        function createConfetti() {
            for(let i=0; i<40; i++) {
                const c = document.createElement('div');
                c.className = 'confetti';
                c.style.left = Math.random() * 100 + 'vw';
                c.style.top = '-10px';
                c.style.backgroundColor = ['#ff0','#f0f','#0ff','#0f0','#fff'].sort(() => 0.5 - Math.random())[0];
                document.body.appendChild(c);
                c.animate([
                    { transform: 'translateY(0) rotate(0)' },
                    { transform: `translateY(100vh) rotate(${Math.random()*360}deg)` }
                ], { duration: 2000 + Math.random()*2000, iterations: Infinity });
            }
        }

        document.getElementById('next-btn').onclick = () => {
            if (!musicStarted) { bgMusic.play(); bgMusic.volume = 0.2; musicStarted = true; }
            if (document.getElementById('choices-container').style.display === 'flex') return;
            showStep();
        };
    </script>
</body>
</html>
